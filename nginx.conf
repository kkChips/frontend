server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── API 反向代理（Sealos/K8s 内部域名格式）───
    # Sealos 同命名空间内，用应用名直接访问：http://<app-name>:<port>
    # 注意：backend 和 ai-tutor 必须先部署成功，nginx 才能解析域名

    # 视频静态文件 → ai-tutor 服务（端口 8000）
    location /static/videos/ {
        proxy_pass http://ai-tutor:8000/static/videos/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # 视频生成 API → ai-tutor（去掉 /v1 前缀，匹配 /api/video/...）
    location /api/v1/video/ {
        rewrite ^/api/v1/(.*)$ /api/$1 break;
        proxy_pass http://ai-tutor:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 其他 API → backend（端口 8000）
    location /api/v1/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
