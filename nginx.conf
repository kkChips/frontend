server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # K8s DNS resolver（延迟解析，避免 upstream 不存在时 nginx 拒绝启动）
    resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

    # SPA 路由 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── API 反向代理（Sealos/K8s 内部域名格式，变量方式：nginx 启动时不预先解析）───

    # 视频静态文件 → ai-tutor 服务（端口 8000）
    location /static/videos/ {
        set $ai_tutor "ai-tutor.ns-bd94dqqa.svc.cluster.local:8000";
        proxy_pass http://$ai_tutor/static/videos/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # 视频生成 API → ai-tutor（去掉 /v1 前缀，匹配 /api/video/...）
    location /api/v1/video/ {
        set $ai_tutor "ai-tutor.ns-bd94dqqa.svc.cluster.local:8000";
        rewrite ^/api/v1/(.*)$ /api/$1 break;
        proxy_pass http://$ai_tutor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 其他 API → backend（端口 8000）
    location /api/v1/ {
        set $backend "backend.ns-bd94dqqa.svc.cluster.local:8000";
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
